name: Lint and Build

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Frontend & Worker — lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm install
      - name: Lint frontend
        run: npm -w frontend run lint
      - name: Lint worker
        run: npm -w worker run lint
      - name: Build frontend
        run: npm -w frontend run build
      - name: Build worker
        run: npm -w worker run build
